name: RAG accuracy guard

# Fails the build if the product knowledge base (lib/product-rag.ts) drifts from
# the code constants it documents — agent prices, bridge source chains, and usage
# caps. Pure check: no secrets / no network required.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/rag-guard.yml"
      - "lib/product-rag.ts"
      - "lib/coreAgentSpecs.ts"
      - "lib/bridge/supportedSources.ts"
      - "lib/usageLimits.ts"
      - "scripts/check-rag-accuracy.ts"
  pull_request:
    paths:
      - ".github/workflows/rag-guard.yml"
      - "lib/product-rag.ts"
      - "lib/coreAgentSpecs.ts"
      - "lib/bridge/supportedSources.ts"
      - "lib/usageLimits.ts"
      - "scripts/check-rag-accuracy.ts"

jobs:
  rag-accuracy:
    runs-on: ubuntu-latest
    env:
      CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Require Cloudsmith token
        run: |
          if [ -z "$CLOUDSMITH_TOKEN" ]; then
            echo "::error::Missing CLOUDSMITH_TOKEN GitHub Actions secret required for npm install."
            exit 1
          fi
      - run: npm ci
      - run: npm run check:rag-accuracy
